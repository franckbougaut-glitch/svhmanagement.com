services:
  - type: web
    name: svh-management
    env: python
    plan: starter
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn --bind 0.0.0.0:$PORT --workers 2 --threads 4 --timeout 120 app:app
    envVars:
      - key: FLASK_SECRET_KEY
        generateValue: true
      - key: SESSION_COOKIE_SECURE
        value: "1"
      - key: TRUST_PROXY
        value: "1"
      - key: MAX_CV_FILE_SIZE_MB
        value: "10"
      - key: SVH_DATA_DIR
        value: /var/data
    disk:
      name: svh-data
      mountPath: /var/data
      sizeGB: 1
